name: linux_asan
on:
  push:
    paths-ignore:
    - 'docs/**'
    branches: [ master ]   # CI on PRs targeting master
  pull_request:
    branches: [ master ]   # CI on PRs targeting master

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1
    - uses: seanmiddleditch/gha-setup-ninja@master
    - name: make test_asan
      run: make -f makefile.dev test_asan
